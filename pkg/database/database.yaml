# 数据库类型
type: mysql
# 是否启用
enabled: false
# 默认使用的数据库
default: mysql
# MySQL配置
mysql:
    module-name: mysql
    host: localhost
    port: "3306"
    config: charset=utf8mb4&parseTime=True&loc=Local
    log-level: info
    slow-threshold: 100
    ignore-record-not-found-error: false
    db-name: test
    username: root
    password: mysql_password
    max-idle-conns: 10
    max-open-conns: 100
    conn-max-idle-time: 300
    conn-max-life-time: 3600
    skip-default-transaction: false
    prepare-stmt: true
    disable-foreign-key-constraint-when-migrating: true
    disable-nested-transaction: false
    allow-global-update: false
    query-fields: true
    create-batch-size: 100
    singular-table: true
# PostgreSQL配置
postgresql:
    module-name: postgresql
    host: localhost
    port: "5432"
    config: sslmode=disable
    log-level: info
    slow-threshold: 100
    ignore-record-not-found-error: false
